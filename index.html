<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Northwind 管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">🏢 北風資料庫 - 客戶管理系統</h1>
            <span id="badge" class="badge bg-secondary">連線中...</span>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>公司名稱</th>
                                <th>負責人</th>
                                <th>職稱</th>
                            </tr>
                        </thead>
                        <tbody id="data-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
<div class="card shadow-sm mt-4">
    <div class="card-header bg-primary text-white">新增客戶資料</div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <input type="text" id="new-company" class="form-control" placeholder="公司名稱">
            </div>
            <div class="col-md-3">
                <input type="text" id="new-name" class="form-control" placeholder="負責人姓名">
            </div>
            <div class="col-md-3">
                <input type="text" id="new-job" class="form-control" placeholder="職稱 (例如: Manager)">
            </div>
            <div class="col-md-3">
                <button onclick="addCustomer()" class="btn btn-success w-100">提交資料</button>
            </div>
        </div>
    </div>
</div>
    
<script>
        const SUPABASE_URL = "https://tpknxeiyfvrstsravetw.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwa254ZWl5ZnZyc3RzcmF2ZXR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzIxNjYsImV4cCI6MjA4ODgwODE2Nn0.2ioEYBXtKMj6dYuNTp6FVGhRwjuYXmYbnK6GChegp_c";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 載入客戶
        async function loadCustomers() {
            const { data, error } = await client
                .from('customers')
                .select('id, company, first_name, last_name, job_title')
                .order('id', { ascending: true });

            const tbody = document.getElementById('data-body');
            const badge = document.getElementById('badge');

            if (error) {
                badge.className = "badge bg-danger";
                badge.innerText = "連線失敗";
                console.error(error);
                return;
            }

            badge.className = "badge bg-success";
            badge.innerText = `連線成功: ${data.length} 筆資料`;

            tbody.innerHTML = ""; 
            data.forEach(item => {
    const row = `
        <tr>
		<td>${item.id}</td>
		<td><strong>${item.company}</strong></td>
		
		<td>${item.first_name} ${item.last_name || ''}</td>
		
		<td><span class="text-muted">${item.job_title || ''}</span></td>
		<td>
			<button onclick="deleteCustomer(${item.id})" class="btn btn-outline-danger btn-sm">刪除</button>
		</td>
	</tr>`;
    tbody.innerHTML += row;
});
        }

        // 新增客戶
        async function addCustomer() {
			const company = document.getElementById('new-company').value;
			const first_name = document.getElementById('new-name').value;
			const job_title = document.getElementById('new-job').value; // 抓取職稱

			if (!company || !first_name) {
				alert("請填寫公司與姓名！");
				return;
			}

			// 將 job_title 加入 insert 物件中
			const { data, error } = await client
				.from('customers')
				.insert([{ 
					company: company, 
					first_name: first_name,
					job_title: job_title 
				}]);

			if (error) {
				alert("新增失敗：" + error.message);
				console.error(error);
			} else {
				alert("新增成功！");
				loadCustomers(); // 重新整理列表
				
				// 清空輸入框
				document.getElementById('new-company').value = "";
				document.getElementById('new-name').value = "";
				document.getElementById('new-job').value = "";
			}
		}

        // 載入產品 (目前只印在 Console)
        async function loadProducts() {
            const { data, error } = await client
                .from('products')
                .select('product_name, standard_cost, list_price, category');

            if (error) {
                console.error(error);
                return;
            }
            console.log("產品資料：", data);
        }
        async function deleteCustomer(id) {
    // 1. 先跳出確認視窗，避免誤刪
    if (!confirm(`確定要刪除 ID: ${id} 的客戶嗎？`)) return;

    // 2. 執行刪除指令
    const { error } = await client
        .from('customers')
        .delete()
        .eq('id', id);

    if (error) {
        alert("刪除失敗：" + error.message);
        console.error(error);
    } else {
        alert("刪除成功！");
        loadCustomers(); // 重新載入列表
    }
} 
        // 執行初始化
        loadCustomers();
        loadProducts();
    </script>
</body>
</html>
