<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>活力購物網 - 您的健康守護者</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="HTML/style.css?v=1.2" rel="stylesheet">
    <style>
        /* 🌟 導覽列放大與強化 */
        .top-nav {
            padding: 1.5rem 3rem !important; 
            background: #ffffff;
            transition: all 0.3s ease;
        }

        .top-nav h2 {
            font-size: 2.2rem !important; 
            letter-spacing: -1px;
        }

        .nav-link-custom {
            font-size: 1.25rem !important; 
            transition: transform 0.2s ease, color 0.2s ease;
            display: inline-block;
        }

        .nav-link-custom:hover {
            transform: scale(1.1);
            color: var(--theme-orange-deep) !important;
        }

        /* 🛒 購物車標籤強化 */
        .cart-badge {
            background-color: var(--theme-orange-deep);
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 2px 9px;
            border-radius: 50px;
            margin-left: 5px;
            display: inline-block; 
            box-shadow: 0 4px 8px rgba(233, 85, 19, 0.3);
            line-height: 1.2;
        }

        /* 首頁專屬樣式 */
        .hero-section {
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                        url('https://images.unsplash.com/photo-1512069772995-ec65ed45afd6?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            padding: 140px 0;
        }

        .featured-banner {
            background: linear-gradient(to right, rgba(233, 85, 19, 0.9), rgba(251, 146, 60, 0.8)), 
                        url('https://images.unsplash.com/photo-1550572566-959c71b641e1?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            border-radius: 40px;
            padding: 100px 50px;
            color: white;
            margin-top: 60px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(233, 85, 19, 0.2);
        }

        /* 📱 響應式排版 (手機與平板專屬) */
        @media (max-width: 768px) {
            /* 導覽列改為上下置中排列 */
            .top-nav {
                padding: 1rem !important; 
                flex-direction: column !important; 
                justify-content: center !important;
                gap: 15px !important;
            }
            .top-nav a.navbar-brand h2 {
                font-size: 1.8rem !important; 
                text-align: center;
                margin: 0 !important;
            }
            .top-nav > div {
                width: 100%;
                justify-content: center !important; 
                gap: 15px !important; 
                flex-wrap: wrap !important; 
            }
            .nav-link-custom {
                font-size: 1.05rem !important; 
            }

            /* 首頁大圖區塊縮小 */
            .hero-section {
                padding: 80px 20px;
            }
            .hero-section h1 {
                font-size: 2.5rem !important; /* 原本太大了，手機縮小 */
            }
            .hero-section p {
                font-size: 1.2rem !important;
            }
            .hero-section .btn {
                padding: 12px 30px !important;
                font-size: 1.2rem !important;
            }

            /* 推薦橫幅縮小 */
            .featured-banner {
                padding: 50px 20px;
                border-radius: 25px;
                margin-top: 30px;
            }
            .featured-banner h2 {
                font-size: 2rem !important;
            }
            .featured-banner p {
                font-size: 1.1rem !important;
            }
            .featured-banner .btn {
                padding: 10px 25px !important;
                font-size: 1.2rem !important;
            }
        }
    </style>
	<script src="HTML/protect.js"></script>
</head>

<body class="frontend">

    <nav class="top-nav d-flex justify-content-between align-items-center sticky-top shadow-sm">
        <a href="index.html" class="text-decoration-none navbar-brand">
            <h2 class="mb-0 fw-bold" style="color: var(--theme-orange-deep);">🛍️ 活力購物網</h2>
        </a>
        <div class="d-flex gap-5 align-items-center"> 
            <a href="index.html" class="nav-link-custom text-decoration-none text-dark fw-bold">首頁</a>
            <a href="HTML/products_all.html" class="nav-link-custom text-decoration-none text-dark fw-bold">所有商品</a>
            
            <a href="HTML/cart.html" class="nav-link-custom text-decoration-none text-dark fw-bold">
                🛒 購物車 <span id="cart-count-badge" class="cart-badge">0</span>
            </a>
            <a href="HTML/login.html" class="nav-link-custom text-decoration-none text-muted small">管理入口</a>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-2 fw-bold mb-4" style="color: var(--theme-orange-deep);">讓健康成為一種習慣</h1>
            <p class="fs-3 text-muted mb-5">專業研發、天然純淨，為您與家人的健康撐起防護傘</p>
            <a href="HTML/products_all.html" class="btn btn-yanni btn-lg px-5 py-3 fs-3 shadow-lg" style="background-color: var(--theme-orange-deep); color: white; border-radius: 50px; font-weight: bold; border: none;">
                🚀 立即選購
            </a>
        </div>
    </header>

    <main class="container my-5">
        <section class="featured-banner">
            <h2 class="display-4 fw-bold mb-3">熱銷精選推薦 🔥</h2>
            <p class="fs-3 mb-4">萬人見證的明星產品，限時優惠進行中</p>
            <a href="HTML/products_all.html" class="btn btn-light fw-bold px-5 py-3 fs-4 rounded-pill shadow" style="color: var(--theme-orange-deep);">
                查看推薦商品
            </a>
        </section>

        <div class="row g-5 mt-5"> 
            <div class="col-md-4 text-center p-4">
                <div style="font-size: 4rem;" class="mb-3">🌿</div>
                <h3 class="fw-bold">天然成分</h3>
                <p class="text-muted fs-5">嚴選全球優質原料，純淨無負擔。</p>
            </div>
            <div class="col-md-4 text-center p-4">
                <div style="font-size: 4rem;" class="mb-3">🧪</div>
                <h3 class="fw-bold">專業研發</h3>
                <p class="text-muted fs-5">專業團隊研發，科學比例配方。</p>
            </div>
            <div class="col-md-4 text-center p-4">
                <div style="font-size: 4rem;" class="mb-3">🛡️</div>
                <h3 class="fw-bold">安心保證</h3>
                <p class="text-muted fs-5">通過多項國際認證，食安無虞。</p>
            </div>
        </div>
    </main>

    <footer class="py-5 bg-white border-top">
        <div class="container text-center text-muted">
            <p class="fs-5">© 2026 活力購物網 - 您最信賴的營養夥伴</p>
        </div>
    </footer>

    <script>
        function updateCartBadge() {
            // 1. 從 localStorage 抓取資料
            const cart = JSON.parse(localStorage.getItem('northwind_cart')) || [];
            
            // 2. 計算「總件數」(Quantity 總和)
            const totalQuantity = cart.reduce((sum, item) => sum + (parseInt(item.quantity) || 0), 0);
            
            const badge = document.getElementById('cart-count-badge');
            
            if (badge) {
                badge.innerText = totalQuantity;
                
                // 3. 判斷顯示邏輯：0 件就藏起來，大於 0 就出現
                if (totalQuantity === 0) {
                    badge.style.display = 'none';
                } else {
                    badge.style.display = 'inline-block';
                }
            }
        }

        // 初始化
        updateCartBadge();
        
        // 監聽 storage 事件（當在別的標籤頁修改購物車時，這頁也會動）
        window.addEventListener('storage', updateCartBadge);
        // 監聽焦點（當從商品頁跳回首頁時，立刻重新計算）
        window.addEventListener('focus', updateCartBadge);
    </script>
</body>
</html>
