<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>所有商品 - 活力購物網</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="HTML/style.css?v=1.1" rel="stylesheet"> 
    <style>
        /* 🌟 放大版導覽列樣式 */
        .top-nav {
            padding: 1.5rem 3rem !important;
            background: #ffffff;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        .top-nav h2 { font-size: 2.2rem !important; }
        .nav-link-custom {
            font-size: 1.25rem !important;
            transition: all 0.2s;
        }
        .nav-link-custom:hover { transform: scale(1.1); color: var(--theme-orange-deep) !important; }

        /* 🛒 購物車數字標籤 (Badge) */
        .cart-badge {
            background-color: var(--theme-orange-deep);
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 2px 9px;
            border-radius: 50px;
            margin-left: 5px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(233, 85, 19, 0.3);
        }

        /* 商品卡片樣式 */
        .product-item {
            transition: all 0.3s ease;
            border: 1px solid #eee !important;
            border-radius: 25px;
            overflow: hidden;
            background: #fff;
            position: relative;
        }
        .product-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(233, 85, 19, 0.15) !important;
            border-color: var(--theme-orange-deep) !important;
        }
        
        /* 🌟 選中狀態的發光效果 */
        .product-item.selected {
            border-color: var(--theme-orange-deep) !important;
            box-shadow: 0 0 0 3px rgba(233, 85, 19, 0.3) !important;
        }
        
        /* 🌟 圖片區域修正 */
        .img-placeholder {
            height: 200px;
            background-color: #ffffff; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            padding: 10px; 
        }
        
        .img-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 數量調整器 */
        .qty-input-group {
            width: 100%;
            max-width: 140px;
            border: 2px solid #eee;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5px;
            margin: 0 auto;
        }
        .btn-qty {
            background: none;
            border: none;
            width: 35px;
            height: 35px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #555;
        }
        .btn-qty:disabled {
            color: #ccc;
            cursor: not-allowed;
        }
        .qty-val {
            width: 40px;
            text-align: center;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            background: transparent;
            color: var(--theme-orange-deep);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        
        /* 🌟 右下角懸浮「批次加入購物車」按鈕 */
        .floating-cart-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--theme-orange-deep), #ff7b00);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(233, 85, 19, 0.4);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1050;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(50px);
            pointer-events: none;
        }
        .floating-cart-btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .floating-cart-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(233, 85, 19, 0.5);
        }
        .floating-badge {
            background-color: white;
            color: var(--theme-orange-deep);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 1rem;
        }

        /* 📱 響應式排版 (平板與手機) */
        @media (max-width: 768px) {
            .img-placeholder { height: 180px; }
            .qty-input-group { max-width: 120px; }
            .btn-qty { width: 30px; height: 30px; font-size: 1rem; }
            
            /* 手機版懸浮按鈕滿版 */
            .floating-cart-btn {
                bottom: 20px;
                right: 20px;
                left: 20px;
                justify-content: center;
                padding: 12px 20px;
            }
        }

        /* 🌟 終極防禦：防止手機快速連點造成畫面放大，並提升點擊反應速度 */
        button, input, select, textarea, a, .btn-qty, .floating-cart-btn {
            touch-action: manipulation;
        }
    </style>
</head>
<script src="protect.js"></script>
<body class="frontend">

    <nav class="top-nav d-flex justify-content-between align-items-center sticky-top">
        <a href="../index.html" class="text-decoration-none">
            <h2 class="mb-0 fw-bold" style="color: var(--theme-orange-deep);">🛍️ 活力購物網</h2>
        </a>
        <div class="d-flex gap-5 align-items-center">
            <a href="../index.html" class="nav-link-custom text-decoration-none text-dark fw-bold">首頁</a>
            <span class="nav-link-custom fw-bold" style="color: var(--theme-orange-deep);">所有商品</span>
            
            <a href="cart.html" class="nav-link-custom text-decoration-none text-dark fw-bold">
                🛒 購物車 <span id="cart-count-badge" class="cart-badge" style="display:none;">0</span>
            </a>
            <a href="login.html" class="nav-link-custom text-decoration-none text-muted small">後台管理</a>
        </div>
    </nav>

    <div class="container py-5">
        <header class="mb-5 text-center">
            <h1 class="display-4 fw-bold">全系列活力好物 🌿</h1>
            <p class="text-muted fs-4">選好商品後，點擊右下角一次加入購物車！</p>
            <hr class="w-25 mx-auto opacity-10">
        </header>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="all-products-grid">
            </div>
    </div>

    <footer class="py-5 mt-5 border-top bg-white">
        <div class="container text-center text-muted">
            <p class="fs-5">© 2026 活力購物網 - 您的健康，我們在乎</p>
        </div>
    </footer>

    <button id="floating-cart-btn" class="floating-cart-btn" onclick="addAllToCart()">
        🛒 一鍵加入購物車
        <span id="floating-qty" class="floating-badge">0 件</span>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Sk2edwpokS.js"></script> 
    <script>
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const twdFormatter = new Intl.NumberFormat('zh-TW', { 
            style: 'currency', 
            currency: 'TWD',
            maximumFractionDigits: 0 
        });
        
        let pendingCart = {}; 
        let globalProducts = [];

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('northwind_cart')) || [];
            const totalQuantity = cart.reduce((sum, item) => sum + (item.quantity || 0), 0);
            const badge = document.getElementById('cart-count-badge');
            
            if (badge) {
                badge.innerText = totalQuantity;
                badge.style.display = (totalQuantity === 0) ? 'none' : 'inline-block';
            }
        }
        
        function updateFloatingBtn() {
            const btn = document.getElementById('floating-cart-btn');
            const qtyBadge = document.getElementById('floating-qty');
            
            let totalPending = 0;
            for (let id in pendingCart) {
                totalPending += pendingCart[id].quantity;
            }
            
            qtyBadge.innerText = `${totalPending} 件`;
            
            if (totalPending > 0) {
                btn.classList.add('show');
            } else {
                btn.classList.remove('show');
            }
        }

        async function loadAllProducts() {
            try {
                const { data, error } = await client
                    .from('products')
                    .select('id, product_name, product_code, list_price, image_url, reorder_level') 
                    .eq('is_deleted', false)
                    .order('id', { ascending: true });

                if (error) throw error;
                globalProducts = data;

                const grid = document.getElementById('all-products-grid');
                grid.innerHTML = "";

                data.forEach(p => {
                    const imageHtml = p.image_url 
                        ? `<img src="${p.image_url}" alt="${p.product_name}">` 
                        : `💊`;

                    const stock = p.reorder_level || 0; 
                    const isOutOfStock = stock <= 0;
                    
                    const stockDisplay = isOutOfStock 
                        ? `<span class="text-danger small fw-bold">缺貨中</span>` 
                        : `<span class="text-success small fw-bold">庫存：${stock}</span>`;
                    
                    const disabledAttr = isOutOfStock ? "disabled" : "";
                    const formattedPrice = twdFormatter.format(p.list_price);

                    grid.innerHTML += `
                        <div class="col">
                            <div class="card h-100 product-item shadow-sm p-3" id="card-${p.id}">
                                <div class="img-placeholder">
                                    ${imageHtml}
                                </div>
                                
                                <div class="card-body d-flex flex-column p-0 mt-3 text-center">
                                    <small class="text-muted mb-1">${p.product_code || '精選系列'}</small>
                                    <h5 class="card-title fw-bold mb-2 text-truncate" title="${p.product_name}">${p.product_name}</h5>
                                    
                                    <div class="fs-4 fw-bold mb-1" style="color: var(--theme-orange-deep);">${formattedPrice}</div>
                                    <div class="mb-3">${stockDisplay}</div>
                                    
                                    <div class="mt-auto">
                                        <div class="qty-input-group bg-light">
                                            <button class="btn-qty" onclick="changeQtyUI(${p.id}, -1, ${stock})" ${disabledAttr}>-</button>
                                            <input type="number" id="qty-${p.id}" class="qty-val" value="0" min="0" max="${stock}" readonly ${disabledAttr}>
                                            <button class="btn-qty" onclick="changeQtyUI(${p.id}, 1, ${stock})" ${disabledAttr}>+</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("載入商品失敗:", err);
                alert("載入商品失敗，請檢查資料庫連線！");
            }
        }

        function changeQtyUI(id, delta, maxStock) {
            const input = document.getElementById(`qty-${id}`);
            const card = document.getElementById(`card-${id}`);
            let val = parseInt(input.value) + delta;
            
            if (val < 0) val = 0;
            
            if (val > maxStock) {
                val = maxStock;
                alert(`已經達到目前庫存上限 (${maxStock} 件) 囉！`);
            }
            
            input.value = val;
            
            if (val > 0) {
                card.classList.add('selected');
                pendingCart[id] = { quantity: val };
            } else {
                card.classList.remove('selected');
                delete pendingCart[id];
            }
            
            updateFloatingBtn();
        }

        function addAllToCart() {
            let cart = JSON.parse(localStorage.getItem('northwind_cart')) || [];
            let addedCount = 0;
            let errorMessages = [];

            for (let id in pendingCart) {
                const productId = parseInt(id);
                const quantityToAdd = pendingCart[id].quantity;
                
                const productInfo = globalProducts.find(p => p.id === productId);
                if (!productInfo) continue;

                const maxStock = productInfo.reorder_level || 0;
                const foundInCart = cart.find(item => item.id === productId);
                const currentCartQty = foundInCart ? foundInCart.quantity : 0;
                
                if (currentCartQty + quantityToAdd > maxStock) {
                    errorMessages.push(`「${productInfo.product_name}」庫存不足 (剩餘 ${maxStock} 件，您購物車內已有 ${currentCartQty} 件)`);
                    continue; 
                }
                
                if (foundInCart) {
                    foundInCart.quantity += quantityToAdd;
                } else {
                    cart.push({ 
                        id: productId, 
                        name: productInfo.product_name, 
                        price: productInfo.list_price, 
                        quantity: quantityToAdd 
                    });
                }
                addedCount += quantityToAdd;
                
                const input = document.getElementById(`qty-${productId}`);
                if(input) input.value = 0;
                const card = document.getElementById(`card-${productId}`);
                if(card) card.classList.remove('selected');
            }
            
            localStorage.setItem('northwind_cart', JSON.stringify(cart));
            
            pendingCart = {};
            updateCartBadge();
            updateFloatingBtn();
            
            if (errorMessages.length > 0) {
                alert(`部分商品無法加入：\n` + errorMessages.join('\n') + `\n\n其餘商品已成功加入購物車！`);
            } else if (addedCount > 0) {
                alert(`🎉 成功將 ${addedCount} 件商品批次加入購物車！`);
            }
        }

        loadAllProducts();
        updateCartBadge();
    </script>
</body>
</html>
