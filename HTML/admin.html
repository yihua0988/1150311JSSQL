<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>⚙️ 活力電商後台 - 營運儀表板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="HTML/style.css?v=1.2" rel="stylesheet">
    
    <style>
        .stat-tile {
            background: #ffffff !important;
            border-radius: 20px !important;
            padding: 2rem 1rem !important; 
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05) !important;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04) !important;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none !important;
            display: block; 
        }
        .stat-tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(233, 85, 19, 0.15) !important;
        }
        .stat-tile-label {
            font-size: 1.1rem !important;
            color: #888 !important;
            font-weight: 700 !important;
            margin-bottom: 5px;
            display: block;
            white-space: nowrap; 
        }
        .stat-tile-number {
            font-size: 3rem !important; 
            font-weight: 900 !important;
            line-height: 1;
            margin: 10px 0;
            display: block;
        }
        .stat-tile-footer {
            font-size: 0.85rem !important;
            color: #bbb !important;
            font-weight: 500;
            display: block;
        }
        .btn-restock-now {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-restock-now:hover { background-color: #c0392b; }

        .chart-card {
            background: #ffffff;
            border-radius: 25px;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
        }

        @media (max-width: 992px) {
            .stat-tile {
                padding: 1.5rem 0.5rem !important; 
            }
            .stat-tile-number {
                font-size: 2.2rem !important;
            }
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.5rem !important; 
            }
            .stat-tile {
                padding: 1.2rem 1rem !important; 
                border-radius: 15px !important;
            }
            .stat-tile-label {
                font-size: 1rem !important;
                margin-bottom: 5px;
            }
            .stat-tile-number {
                font-size: 2rem !important; 
                margin: 5px 0;
            }
            .stat-tile-footer {
                font-size: 0.8rem !important;
            }
            .chart-card {
                padding: 1rem !important; 
                border-radius: 15px;
            }
            .chart-card h4 {
                font-size: 1.1rem !important; 
            }
            #chart-total-display {
                font-size: 1.1rem !important;
            }
            .filter-btn {
                margin-top: 10px !important; 
                width: calc(50% - 5px) !important; 
                padding: 8px !important;
            }
            .filter-btn.reset {
                width: calc(50% - 5px) !important;
            }
            #chart-metric-select {
                margin-top: 15px !important; 
                width: 100% !important; 
                padding: 8px !important;
            }
            .chart-container {
                height: 280px !important;
            }
        }
    </style>
</head>
<script src="protect.js"></script>
<body class="backend">

    <div class="app-container">
        <nav class="sidebar">
            <h2 class="mb-4">🛍️ 系統後台</h2>
            <div class="mb-4 px-2 py-3 border-bottom border-white border-opacity-25">
                <small class="text-white-50 d-block mb-1">管理權限已驗證</small>
                <span id="admin-display-name" class="text-white fw-bold fs-4">管理員</span>
            </div>
            
            <a href="admin.html" class="nav-item active">📊 營運儀表板</a>
            <a href="orders.html" class="nav-item">📋 訂單管理</a> 
            <a href="customers.html" class="nav-item">👥 客戶管理</a>
            <a href="products.html" class="nav-item">📦 庫存管理</a>
            
            <div style="flex-grow: 1;"></div> 

            <hr class="text-white-50">
            <a href="#" onclick="handleLogout()" class="nav-item text-danger bg-white bg-opacity-10">🚪 登出系統</a>
            <a href="../index.html" class="nav-item text-muted small mt-2">⬅️ 返回商店前台</a>
        </nav>

        <main class="main-content">
            <div class="card p-4 mb-4 border-0 shadow-sm" style="border-radius: 20px !important;">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <h1 class="page-title mb-1" style="font-weight: 900;">活力電商後台</h1>
                        <p class="text-muted mb-0 fs-6">您好！目前商城的即時數據表現如下：</p>
                    </div>
                    <div id="current-date" class="fw-bold fs-6 px-4 py-2 rounded-pill shadow-sm" style="background: var(--theme-bg-light); color: var(--theme-orange-deep);"></div>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4 col-12">
                    <div class="stat-tile" onclick="location.href='customers.html'">
                        <span class="stat-tile-label">👥 總客戶數</span>
                        <span class="stat-tile-number" id="total-customers" style="color: var(--theme-pink);">--</span>
                        <span class="stat-tile-footer">點擊進入管理詳細名單</span>
                    </div>
                </div>

                <div class="col-md-4 col-12">
                    <div class="stat-tile" onclick="location.href='orders.html'">
                        <span class="stat-tile-label">📋 總訂單數</span>
                        <span class="stat-tile-number" id="total-orders" style="color: var(--theme-orange-deep);">--</span>
                        <span class="stat-tile-footer">點擊查看最新訂單明細</span>
                    </div>
                </div>

                <div class="col-md-4 col-12">
                    <div class="stat-tile" id="stock-tile-box" onclick="location.href='products.html'">
                        <span class="stat-tile-label" id="stock-status-label">庫存讀取中...</span>
                        <span class="stat-tile-number" id="total-out-of-stock">--</span>
                        <div id="restock-area">
                            <span class="stat-tile-footer">正在檢查商品庫存狀態</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-5">
                <div class="col-12">
                    <div class="chart-card">
                        
                        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3 border-bottom pb-3">
                            <div>
                                <h4 class="fw-bold text-secondary mb-2">📈 銷售數據排行 (Top 10)</h4>
                                <h4 class="fw-bold mb-0" style="color: var(--theme-orange-deep);">
                                    總計：<span id="chart-total-display">--</span>
                                </h4>
                            </div>
                            
                            <div class="d-flex flex-wrap gap-2 align-items-end bg-light p-3 rounded-4 border w-100 w-lg-auto">
                                <div>
                                    <small class="text-muted d-block fw-bold">開始日期</small>
                                    <input type="date" id="filter-start" class="form-control form-control-sm border-0 shadow-sm">
                                </div>
                                <div class="px-1 text-muted d-flex align-items-end pb-1">~</div>
                                <div>
                                    <small class="text-muted d-block fw-bold">結束日期</small>
                                    <input type="date" id="filter-end" class="form-control form-control-sm border-0 shadow-sm">
                                </div>
                                <button class="btn btn-sm btn-dark shadow-sm px-3 filter-btn" onclick="fetchChartData()">🔍 篩選</button>
                                <button class="btn btn-sm btn-outline-secondary shadow-sm filter-btn reset" onclick="resetFilter()">重置</button>

                                <div class="border-start border-2 mx-2 d-none d-sm-block"></div>

                                <div class="mt-2 mt-sm-0 w-100 w-sm-auto">
                                    <small class="text-muted d-block fw-bold">分析指標</small>
                                    <select id="chart-metric-select" class="form-select form-select-sm w-100 fw-bold shadow-sm border-0 text-primary" onchange="changeChartMetric()">
                                        <option value="revenue">💰 總營收排行</option>
                                        <option value="volume">📦 總銷量排行</option>
                                        <option value="shipped_revenue">✨ 淨利排行 (已出貨)</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="chart-container" style="position: relative; height: 350px; width: 100%;">
                            <canvas id="salesChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div class="modal fade" id="productSalesModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content" style="border-radius: 20px; border: 3px solid var(--theme-orange-deep);">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-secondary">📊 商品銷售詳情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 pt-3">
                    <h4 id="modal-sale-name" class="fw-bold mb-4 text-center" style="color: var(--theme-orange-deep);">商品名稱</h4>
                    
                    <div class="d-flex justify-content-between align-items-center mb-3 fs-5 border-bottom pb-2">
                        <span class="text-muted fw-bold">📦 總銷量</span>
                        <strong id="modal-sale-qty" class="text-primary">--</strong>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-3 fs-5 border-bottom pb-2">
                        <span class="text-muted fw-bold">💰 總營收</span>
                        <strong id="modal-sale-rev" class="text-danger">--</strong>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center fs-5">
                        <span class="text-muted fw-bold">✨ 出貨實收</span>
                        <strong id="modal-sale-shipped" class="text-success">--</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="Sk2edwpokS.js"></script>

    <script>
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-TW', { 
            year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' 
        });

        const adminData = localStorage.getItem('admin_user');
        if (!adminData) window.location.href = 'login.html';
        else document.getElementById('admin-display-name').innerText = JSON.parse(adminData).username;

        function handleLogout() { localStorage.removeItem('admin_user'); window.location.href = 'login.html'; }

        Chart.register(ChartDataLabels);

        let salesChartInstance = null; 
        let globalSalesData = [];      

        function renderSalesChart(data, metric) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            
            if (salesChartInstance) {
                salesChartInstance.destroy();
            }
            
            const sortedData = [...data].sort((a, b) => b[metric] - a[metric]).slice(0, 10);
            
            const labels = sortedData.map(item => item.product_name);
            const values = sortedData.map(item => item[metric]);
            
            let labelName = '';
            let prefix = '';

            if (metric === 'total_revenue') {
                labelName = '商品總營收';
                prefix = '$';
            } else if (metric === 'total_sold_qty') {
                labelName = '商品總銷量';
                prefix = '';
            } else if (metric === 'shipped_revenue') {
                labelName = '淨利 (已出貨)';
                prefix = '$';
            }

            salesChartInstance = new Chart(ctx, {
                type: 'bar', 
                data: {
                    labels: labels,
                    datasets: [{
                        label: labelName,
                        data: values,
                        backgroundColor: function(context) {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            
                            const gradients = [
                                ['#0052D4', '#6FB1FC'], 
                                ['#11998e', '#38ef7d'], 
                                ['#8E2DE2', '#4A00E0'], 
                                ['#FF512F', '#F09819'], 
                                ['#00B4DB', '#0083B0'], 
                                ['#FF416C', '#FF4B2B'], 
                                ['#8A2387', '#E94057'], 
                                ['#1D976C', '#93F9B9'], 
                                ['#314755', '#26a0da'], 
                                ['#e65c00', '#F9D423']  
                            ];
                            
                            let index = context.dataIndex;
                            let colorSet = gradients[index % gradients.length];
                            
                            let gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                            gradient.addColorStop(0, colorSet[0]);
                            gradient.addColorStop(1, colorSet[1]);
                            return gradient;
                        },
                        borderRadius: { topLeft: 15, topRight: 15, bottomLeft: 0, bottomRight: 0 },
                        borderWidth: 0,
                        maxBarThickness: 55
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: { top: 30 } 
                    },
                    onHover: (event, chartElement) => {
                        event.native.target.style.cursor = chartElement[0] ? 'pointer' : 'default';
                    },
                    onClick: (event, activeElements) => {
                        if (activeElements.length > 0) {
                            const dataIndex = activeElements[0].index;
                            const clickedProduct = sortedData[dataIndex];
                            
                            document.getElementById('modal-sale-name').innerText = clickedProduct.product_name;
                            document.getElementById('modal-sale-qty').innerText = clickedProduct.total_sold_qty + ' 件';
                            document.getElementById('modal-sale-rev').innerText = '$' + clickedProduct.total_revenue.toLocaleString();
                            document.getElementById('modal-sale-shipped').innerText = '$' + clickedProduct.shipped_revenue.toLocaleString();
                            
                            new bootstrap.Modal(document.getElementById('productSalesModal')).show();
                        }
                    },
                    plugins: {
                        legend: { display: false }, 
                        // 🌟 核心魔法：升級高質感懸浮提示框 (Tooltip)
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#E95513',
                            titleFont: { size: 16, weight: 'bold' },
                            bodyColor: '#333',
                            bodyFont: { size: 14, weight: '500' },
                            borderColor: 'rgba(233, 85, 19, 0.2)',
                            borderWidth: 1,
                            padding: 15,
                            displayColors: false, // 隱藏旁邊的小方塊，更簡潔
                            callbacks: {
                                title: function(context) {
                                    return context[0].label; // 顯示商品名稱
                                },
                                label: function(context) {
                                    // 直接把該商品的三個數據都列出來
                                    const product = sortedData[context.dataIndex];
                                    return [
                                        `📦 總銷量：${product.total_sold_qty} 件`,
                                        `💰 總營收：$${product.total_revenue.toLocaleString()}`,
                                        `✨ 出貨實收：$${product.shipped_revenue.toLocaleString()}`
                                    ];
                                }
                            }
                        },
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            color: '#555',
                            font: { weight: 'bold', size: 12 },
                            formatter: function(value) {
                                if (value === 0) return ''; 
                                let unit = metric === 'total_sold_qty' ? '件' : '';
                                return prefix + value.toLocaleString() + unit;
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { maxRotation: 45, minRotation: 45 } 
                        },
                        y: { 
                            type: 'logarithmic', 
                            min: 1, 
                            grace: '30%', 
                            ticks: {
                                callback: function(value) {
                                    const allowedTicks = [1, 10, 100, 1000, 10000, 100000, 1000000, 10000000];
                                    if (allowedTicks.includes(value)) {
                                        return prefix + value.toLocaleString(); 
                                    }
                                    return null; 
                                }
                            }
                        }
                    }
                }
            });
        }

        function changeChartMetric() {
            const val = document.getElementById('chart-metric-select').value;
            let metricKey = 'total_revenue'; 
            
            if (val === 'volume') metricKey = 'total_sold_qty';
            if (val === 'shipped_revenue') metricKey = 'shipped_revenue';
            
            renderSalesChart(globalSalesData, metricKey);

            const totalSum = globalSalesData.reduce((sum, item) => sum + item[metricKey], 0);
            const prefix = metricKey === 'total_sold_qty' ? '' : '$';
            const unit = metricKey === 'total_sold_qty' ? ' 件' : '';
            document.getElementById('chart-total-display').innerText = prefix + totalSum.toLocaleString() + unit;
        }

        async function fetchChartData() {
            const startDate = document.getElementById('filter-start').value;
            const endDate = document.getElementById('filter-end').value;

            try {
                let query = client
                    .from('order_details')
                    .select(`
                        quantity, 
                        unit_price,
                        products ( id, product_name ),
                        orders!inner ( status, order_date )
                    `)
                    .neq('orders.status', '已取消');

                if (startDate) query = query.gte('orders.order_date', startDate + 'T00:00:00');
                if (endDate) query = query.lte('orders.order_date', endDate + 'T23:59:59');

                const { data, error } = await query;
                if (error) throw error;

                const map = {};
                data.forEach(row => {
                    const pId = row.products?.id;
                    const pName = row.products?.product_name || '未知商品';
                    if(!pId) return;

                    if(!map[pId]) {
                        map[pId] = { product_name: pName, total_sold_qty: 0, total_revenue: 0, shipped_revenue: 0 };
                    }
                    
                    const qty = row.quantity;
                    const rev = qty * row.unit_price;
                    const status = row.orders.status;
                    
                    map[pId].total_sold_qty += qty;
                    map[pId].total_revenue += rev;
                    if(status === '已出貨' || status === '已完成') {
                        map[pId].shipped_revenue += rev; 
                    }
                });

                globalSalesData = Object.values(map);
                changeChartMetric(); 

            } catch (err) {
                console.error('載入圖表資料失敗:', err);
                alert('無法載入圖表資料，請稍後再試！');
            }
        }

        function resetFilter() {
            document.getElementById('filter-start').value = '';
            document.getElementById('filter-end').value = '';
            fetchChartData();
        }

        async function loadTopTiles() {
            try {
                const [cRes, oRes, pOutRes] = await Promise.all([
                    client.from('customers').select('*', { count: 'exact', head: true }).eq('is_deleted', false),
                    client.from('orders').select('*', { count: 'exact', head: true }),
                    client.from('products').select('*', { count: 'exact', head: true }).eq('is_deleted', false).lte('reorder_level', 0)
                ]);

                document.getElementById('total-customers').innerText = cRes.count || 0;
                document.getElementById('total-orders').innerText = oRes.count || 0;
                
                const count = pOutRes.count || 0;
                const outOfStockNum = document.getElementById('total-out-of-stock');
                const labelEl = document.getElementById('stock-status-label');
                const areaEl = document.getElementById('restock-area');
                const boxEl = document.getElementById('stock-tile-box');

                outOfStockNum.innerText = count;

                if (count === 0) {
                    labelEl.innerText = "庫存狀態良好";
                    outOfStockNum.style.color = "#2ecc71";
                    labelEl.style.color = "#2ecc71";
                    areaEl.innerHTML = '<span class="badge bg-success py-2 px-3 rounded-pill">✅ 庫存充足</span>';
                    boxEl.style.background = "#FFFFFF";
                } else {
                    labelEl.innerText = `目前有 ${count} 產品缺貨`;
                    outOfStockNum.style.color = "#e74c3c";
                    labelEl.style.color = "#e74c3c";
                    areaEl.innerHTML = '<button class="btn-restock-now shadow-sm">🚀 立即補貨</button>';
                    boxEl.style.background = "#FFF5F5";
                }
            } catch (err) { console.error('載入方塊資料失敗:', err); }
        }

        loadTopTiles();
        fetchChartData(); 
    </script>
</body>
</html>
