<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>📋 訂單管理 - 活力電商後台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css?v=1.2" rel="stylesheet">
    <style>
        .table-card {
            border-radius: 30px !important;
            background: #ffffff;
        }
        
        .table thead th, .table tbody td {
            white-space: nowrap !important;
            vertical-align: middle;
        }
        
        .table thead th {
            background-color: #f8f9fa;
            font-weight: 700;
            color: #666;
            padding: 1.2rem 1rem;
        }

        .status-badge {
            font-size: 0.9rem;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block; 
            white-space: nowrap; 
            text-align: center;
        }
        .status-pending { background-color: #ffeaa7; color: #d35400; }
        .status-shipped { background-color: #74b9ff; color: #0984e3; }
        .status-completed { background-color: #55efc4; color: #00b894; }
        .status-cancelled { background-color: #ff7675; color: #d63031; }

        /* 🌟 分類按鈕選中時的樣式 */
        .filter-btn-group .btn.active {
            background-color: var(--theme-orange-deep);
            color: white;
            border-color: var(--theme-orange-deep);
        }

        /* 🌟 搜尋與篩選列排版 (解決手機版跑掉的問題) */
        .search-filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .search-bar {
            flex: 1; /* 電腦版自動佔據空間 */
            min-width: 250px;
            max-width: 400px;
            border-radius: 50px;
            padding-left: 20px;
        }
        .filter-scroll {
            max-width: 100%;
            overflow-x: auto; /* 超出範圍允許左右滑動 */
            -webkit-overflow-scrolling: touch; /* 讓 iOS 滑動更順暢 */
            padding-bottom: 5px; /* 避免陰影被切掉 */
        }
        .filter-btn-group {
            border-radius: 50px;
            display: inline-flex; /* 確保按鈕永遠排成一列不換行 */
        }
        /* 隱藏上方自訂滑動區的醜醜滾動條 */
        .filter-scroll::-webkit-scrollbar { display: none; }

        .sticky-arrow-wrapper {
            position: sticky;
            top: 50vh;
            z-index: 100;
            width: 100%;
            height: 0;
            pointer-events: none; 
        }

        .scroll-arrow {
            display: none; 
            position: absolute;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(5px); 
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(233, 85, 19, 0.2);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            color: var(--theme-orange-deep);
            font-weight: 900;
            font-size: 1.3rem;
            text-align: center;
            line-height: 38px;
            cursor: pointer;
            transition: opacity 0.3s ease;
            user-select: none;
            pointer-events: auto; 
        }

        .table-responsive::-webkit-scrollbar {
            height: 6px;
        }
        .table-responsive::-webkit-scrollbar-thumb {
            background-color: #e0e0e0;
            border-radius: 10px;
        }

        @media (max-width: 992px) {
            .table-card {
                padding: 1.5rem !important;
                border-radius: 20px !important;
            }
        }

        /* 📱 響應式排版 (手機尺寸壓縮) */
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.5rem !important; 
            }
            .table-card {
                padding: 1rem !important; 
                border-radius: 15px !important;
            }
            .table thead th, .table tbody td {
                padding: 0.8rem 0.5rem !important;
                font-size: 0.95rem;
            }
            .scroll-arrow {
                display: block;
            }
            .scroll-arrow-left { left: -5px; }
            .scroll-arrow-right { right: -5px; }

            /* 🌟 手機版搜尋列改為上下排列，解決無法點擊的問題 */
            .search-filter-container {
                flex-direction: column; 
                align-items: stretch; /* 讓子元素全部寬度 100% */
            }
            .search-bar {
                max-width: 100% !important; /* 搜尋框滿版 */
            }
            .filter-scroll {
                width: 100%; 
            }
        }
    </style>
</head>
<script src="protect.js"></script>
<body class="backend">
    <div class="app-container">
        <nav class="sidebar">
            <h2 class="mb-4">🛍️ 系統後台</h2>
            <div class="mb-4 px-2 py-3 border-bottom border-white border-opacity-25">
                <small class="text-white-50 d-block mb-1">管理權限已驗證</small>
                <span id="admin-display-name" class="text-white fw-bold fs-4">管理員</span>
            </div>
            <a href="admin.html" class="nav-item">📊 營運儀表板</a>
            <a href="orders.html" class="nav-item active">📋 訂單管理</a> 
            <a href="customers.html" class="nav-item">👥 客戶管理</a>
            <a href="products.html" class="nav-item">📦 庫存管理</a>
            <div style="flex-grow: 1;"></div> 
            <hr class="text-white-50">
            <a href="#" onclick="handleLogout()" class="nav-item text-danger bg-white bg-opacity-10">🚪 登出系統</a>
            <a href="../index.html" class="nav-item text-muted small mt-2">⬅️ 返回商店前台</a>
        </nav>

        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                <h1 class="page-title mb-0" style="font-weight: 900;">訂單管理系統 📋</h1>
                <button class="btn btn-outline-dark fw-bold bg-white shadow-sm" onclick="fetchOrders()">🔄 重新整理</button>
            </div>

            <div class="search-filter-container mb-4">
                <input type="text" id="searchInput" class="form-control form-control-lg shadow-sm search-bar" placeholder="🔍 搜尋訂單編號、姓名或電話...">
                
                <div class="filter-scroll">
                    <div class="btn-group filter-btn-group shadow-sm bg-white" role="group" id="statusFilters">
                        <button type="button" class="btn btn-outline-dark fw-bold active" data-status="all">全部訂單</button>
                        <button type="button" class="btn btn-outline-dark fw-bold" data-status="待處理">🟡 待處理</button>
                        <button type="button" class="btn btn-outline-dark fw-bold" data-status="已出貨">🚚 已出貨</button>
                        <button type="button" class="btn btn-outline-dark fw-bold" data-status="已完成">✅ 已完成</button>
                        <button type="button" class="btn btn-outline-dark fw-bold" data-status="已取消">❌ 已取消</button>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm p-4 table-card position-relative">
                
                <div class="sticky-arrow-wrapper">
                    <div id="arrow-left" class="scroll-arrow scroll-arrow-left" onclick="scrollTable(-150)" style="opacity: 0; pointer-events: none;">❮</div>
                    <div id="arrow-right" class="scroll-arrow scroll-arrow-right" onclick="scrollTable(150)">❯</div>
                </div>

                <div class="table-responsive" id="table-container">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>訂單編號</th>
                                <th>建立時間</th>
                                <th>客戶資訊</th>
                                <th>付款方式</th>
                                <th>總金額</th>
                                <th>目前狀態</th>
                                <th>操作管理</th>
                            </tr>
                        </thead>
                        <tbody id="order-list">
                            <tr><td colspan="7" class="text-center py-5">訂單載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" style="border-radius: 25px; border: none;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold fs-4">🧾 訂單明細 <span id="modal-order-id" class="text-muted fs-6"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    
                    <div class="bg-light p-3 rounded-4 mb-3">
                        <h6 class="fw-bold mb-3 text-secondary">📦 寄送資訊</h6>
                        <div class="row">
                            <div class="col-sm-6"><p class="mb-1"><strong>收件人：</strong> <span id="modal-cust-name"></span></p></div>
                            <div class="col-sm-6"><p class="mb-1"><strong>電話：</strong> <span id="modal-cust-phone"></span></p></div>
                            <div class="col-12"><p class="mb-0"><strong>地址：</strong> <span id="modal-cust-address"></span></p></div>
                        </div>
                    </div>

                    <div class="bg-light p-3 rounded-4 mb-4">
                        <h6 class="fw-bold mb-3 text-secondary">🏷️ 配送與發票設定</h6>
                        <div class="row">
                            <div class="col-sm-6"><p class="mb-1"><strong>⏰ 收件時間：</strong> <span id="modal-delivery-time" class="text-primary fw-bold"></span></p></div>
                            <div class="col-sm-6"><p class="mb-1"><strong>🧾 發票方式：</strong> <span id="modal-invoice-info"></span></p></div>
                            <div class="col-12 mt-2" id="modal-remarks-container" style="display: none;">
                                <div class="alert alert-warning mb-0 p-2 small">
                                    <strong>📝 買家備註：</strong> <span id="modal-order-remarks"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <h6 class="fw-bold mb-3 text-secondary">🛍️ 購買商品</h6>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>商品名稱</th>
                                    <th>單價</th>
                                    <th>數量</th>
                                    <th class="text-end">小計</th>
                                </tr>
                            </thead>
                            <tbody id="modal-items-list">
                                </tbody>
                        </table>
                    </div>
                    
                    <div class="d-flex justify-content-end mt-3">
                        <h4 class="fw-bold">總計金額：<span id="modal-total-amount" style="color: var(--theme-orange-deep);"></span></h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="statusModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content" style="border-radius: 20px;">
                <div class="modal-body p-4 text-center">
                    <h5 class="fw-bold mb-4">更新訂單狀態</h5>
                    <input type="hidden" id="status_order_id">
                    <div class="d-grid gap-2">
                        <button class="btn btn-warning fw-bold" onclick="updateStatus('待處理')">🟡 待處理</button>
                        <button class="btn btn-primary fw-bold" onclick="updateStatus('已出貨')">🚚 已出貨</button>
                        <button class="btn btn-success fw-bold" onclick="updateStatus('已完成')">✅ 已完成</button>
                        <button class="btn btn-danger fw-bold" onclick="updateStatus('已取消')">❌ 已取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Sk2edwpokS.js"></script>

    <script>
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const formatter = new Intl.NumberFormat('zh-TW', { 
            style: 'currency', 
            currency: 'TWD',
            maximumFractionDigits: 0 
        });
        
        let allOrders = [];
        
        let currentStatusFilter = 'all';
        let currentSearchQuery = '';

        const adminData = localStorage.getItem('admin_user');
        if (!adminData) window.location.href = 'login.html';
        else document.getElementById('admin-display-name').innerText = JSON.parse(adminData).username;

        const tableContainer = document.getElementById('table-container');
        const arrowLeft = document.getElementById('arrow-left');
        const arrowRight = document.getElementById('arrow-right');

        function updateArrows() {
            if (tableContainer.scrollWidth <= tableContainer.clientWidth) {
                arrowLeft.style.opacity = '0';
                arrowLeft.style.pointerEvents = 'none';
                arrowRight.style.opacity = '0';
                arrowRight.style.pointerEvents = 'none';
                return;
            }
            if (tableContainer.scrollLeft > 0) {
                arrowLeft.style.opacity = '1';
                arrowLeft.style.pointerEvents = 'auto';
            } else {
                arrowLeft.style.opacity = '0';
                arrowLeft.style.pointerEvents = 'none';
            }
            if (Math.ceil(tableContainer.scrollLeft + tableContainer.clientWidth) >= tableContainer.scrollWidth) {
                arrowRight.style.opacity = '0';
                arrowRight.style.pointerEvents = 'none';
            } else {
                arrowRight.style.opacity = '1';
                arrowRight.style.pointerEvents = 'auto';
            }
        }

        function scrollTable(amount) {
            tableContainer.scrollBy({ left: amount, behavior: 'smooth' });
        }

        tableContainer.addEventListener('scroll', updateArrows);
        window.addEventListener('resize', updateArrows);

        // 監聽搜尋輸入框
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearchQuery = e.target.value.toLowerCase();
            applyFilters();
        });

        // 監聽狀態篩選按鈕
        document.querySelectorAll('#statusFilters .btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#statusFilters .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentStatusFilter = e.target.getAttribute('data-status');
                applyFilters();
            });
        });

        async function fetchOrders() {
            try {
                const { data, error } = await client
                    .from('orders')
                    .select(`
                        id, 
                        order_date, 
                        total_amount, 
                        payment_method, 
                        status,
                        delivery_time,
                        invoice_type,
                        invoice_detail,
                        order_remarks,
                        customers ( first_name, business_phone, address )
                    `)
                    .order('id', { ascending: false });

                if (error) throw error;
                allOrders = data;
                applyFilters();
            } catch (err) {
                console.error("載入訂單失敗:", err);
                document.getElementById('order-list').innerHTML = `<tr><td colspan="7" class="text-center text-danger py-5">讀取失敗：${err.message}</td></tr>`;
            }
        }

        function applyFilters() {
            let filteredOrders = allOrders;

            if (currentStatusFilter !== 'all') {
                filteredOrders = filteredOrders.filter(o => o.status === currentStatusFilter);
            }

            if (currentSearchQuery) {
                filteredOrders = filteredOrders.filter(o => {
                    const idStr = String(o.id);
                    const name = (o.customers?.first_name || '').toLowerCase();
                    const phone = (o.customers?.business_phone || '').toLowerCase();
                    return idStr.includes(currentSearchQuery) || 
                           name.includes(currentSearchQuery) || 
                           phone.includes(currentSearchQuery);
                });
            }

            renderOrders(filteredOrders);
        }

        function renderOrders(list) {
            const tbody = document.getElementById('order-list');
            if(list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-muted">目前沒有符合條件的訂單</td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(order => {
                // 🌟 直接將從 Supabase 收到的帶有時區標籤的字串，轉換成本地(台灣)時間
                const dateObj = new Date(order.order_date);
                const dateStr = dateObj.toLocaleString('zh-TW', { 
                    timeZone: 'UTC', 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit', 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: false
                });
                
                const custName = order.customers ? order.customers.first_name : '未知客戶';
                const custPhone = order.customers ? order.customers.business_phone : '無電話';

                let statusClass = 'status-pending';
                if(order.status === '已出貨') statusClass = 'status-shipped';
                if(order.status === '已完成') statusClass = 'status-completed';
                if(order.status === '已取消') statusClass = 'status-cancelled';

                let payText = order.payment_method === 'cod' ? '🚚 貨到付款' : 
                              order.payment_method === 'credit' ? '💳 信用卡' : '🏦 銀行轉帳';

                const remarkBadge = order.order_remarks ? `<span class="badge bg-warning text-dark ms-2">📝 有備註</span>` : '';

                return `
                <tr>
                    <td class="fw-bold">#${order.id} ${remarkBadge}</td>
                    <td class="text-muted small">${dateStr}</td>
                    <td>
                        <div class="fw-bold" style="color: var(--theme-orange-deep);">${custName}</div>
                        <div class="text-muted small">${custPhone}</div>
                    </td>
                    <td><span class="badge bg-light text-dark border">${payText}</span></td>
                    <td class="fw-bold fs-5">${formatter.format(order.total_amount)}</td>
                    <td><span class="status-badge ${statusClass}">${order.status}</span></td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-outline-dark fw-bold" onclick="viewOrderDetails(${order.id})">🔍 明細</button>
                            <button class="btn btn-sm btn-outline-primary fw-bold" onclick="openStatusModal(${order.id})">⚙️ 狀態</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            setTimeout(updateArrows, 100); 
        }

        async function viewOrderDetails(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;

            document.getElementById('modal-order-id').innerText = `(訂單編號: #${order.id})`;
            document.getElementById('modal-cust-name').innerText = order.customers ? order.customers.first_name : '未知';
            document.getElementById('modal-cust-phone').innerText = order.customers ? order.customers.business_phone : '未知';
            document.getElementById('modal-cust-address').innerText = order.customers ? order.customers.address : '未知';
            document.getElementById('modal-total-amount').innerText = formatter.format(order.total_amount);

            document.getElementById('modal-delivery-time').innerText = order.delivery_time || '不指定';
            
            let invoiceInfo = order.invoice_type || '未提供';
            if (order.invoice_detail) {
                invoiceInfo += ` (${order.invoice_detail})`;
            }
            document.getElementById('modal-invoice-info').innerText = invoiceInfo;

            const remarksContainer = document.getElementById('modal-remarks-container');
            if (order.order_remarks) {
                document.getElementById('modal-order-remarks').innerText = order.order_remarks;
                remarksContainer.style.display = 'block';
            } else {
                remarksContainer.style.display = 'none';
            }

            const tbody = document.getElementById('modal-items-list');
            tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">明細載入中...</td></tr>`;
            new bootstrap.Modal(document.getElementById('detailsModal')).show();

            try {
                const { data, error } = await client
                    .from('order_details')
                    .select(`
                        quantity, 
                        unit_price,
                        products ( product_name )
                    `)
                    .eq('order_id', orderId);

                if (error) throw error;

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">找不到商品明細</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.map(item => {
                    const prodName = item.products ? item.products.product_name : '未知商品 (可能已下架)';
                    const subtotal = item.unit_price * item.quantity;
                    return `
                        <tr>
                            <td class="fw-bold">${prodName}</td>
                            <td>${formatter.format(item.unit_price)}</td>
                            <td>x ${item.quantity}</td>
                            <td class="text-end fw-bold">${formatter.format(subtotal)}</td>
                        </tr>
                    `;
                }).join('');
                
                tbody.innerHTML += `
                    <tr class="table-light text-muted">
                        <td colspan="3" class="text-end">物流運費</td>
                        <td class="text-end fw-bold">${formatter.format(60)}</td>
                    </tr>
                `;

            } catch (err) {
                console.error("載入明細失敗:", err);
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">載入失敗</td></tr>`;
            }
        }

        function openStatusModal(orderId) {
            document.getElementById('status_order_id').value = orderId;
            new bootstrap.Modal(document.getElementById('statusModal')).show();
        }

        async function updateStatus(newStatus) {
            const orderId = document.getElementById('status_order_id').value;
            try {
                const { error } = await client
                    .from('orders')
                    .update({ status: newStatus })
                    .eq('id', orderId);
                    
                if (error) throw error;
                
                bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
                fetchOrders(); 
            } catch (err) {
                alert("更新狀態失敗：" + err.message);
            }
        }

        function handleLogout() { localStorage.removeItem('admin_user'); window.location.href = 'login.html'; }
        
        fetchOrders();
    </script>
</body>
</html>
